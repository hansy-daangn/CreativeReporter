function wireScLib(){
  const libH=$("#scLibH");
  if(libH)libH.onclick=()=>{const b=$("#scLibBody"),open=b.hasAttribute("hidden");if(open){b.removeAttribute("hidden");libH.setAttribute("aria-expanded","true");libH.querySelector(".sc-car").style.transform="rotate(90deg)";}else{b.setAttribute("hidden","");libH.setAttribute("aria-expanded","false");libH.querySelector(".sc-car").style.transform="";}};
  const lib=$("#scLibBody");
  if(lib)lib.onchange=e=>{const cb=e.target.closest("input[type=checkbox]");if(!cb)return;
    const key=_scKey,list=_scDraft[key],k=cb.dataset.k,def=(SCORING[key]||[]).find(s=>s.k===k),m=MET_META[k]||{lab:k,dir:1};
    const spec={k,lab:(def&&def.lab)||m.lab,dir:(def?def.dir:m.dir),w:0.1,grp:grpOf(k)};
    if(def){if(def.entCt)spec.entCt=def.entCt;if(def.entFo)spec.entFo=def.entFo;if(def.videoOnly)spec.videoOnly=def.videoOnly;}else if(m.videoOnly)spec.videoOnly=true;
    const ri=list.findIndex(s=>s.isReach);list.splice(ri<0?list.length:ri,0,spec);renderScBody();};}
/* 본문(슬라이더·숫자·빼기) 리스너 — 모달당 1회만. 현재 매체 draft를 동적으로 읽어 재렌더에도 안전 */
function wireScBodyOnce(body){
  body.addEventListener("input",e=>{const inp=e.target.closest(".sc-num");if(!inp)return;
    const list=_scDraft[_scKey],i=+inp.closest(".sc-row").dataset.i;let v=parseFloat(inp.value);if(isNaN(v))return;
    list[i].w=Math.max(0,Math.min(100,v))/100;_scUpdateRow(i,inp);});
  body.addEventListener("click",e=>{const rm=e.target.closest(".sc-rm");if(!rm)return;
    _scDraft[_scKey].splice(+rm.closest(".sc-row").dataset.i,1);renderScBody();});
  const setFromX=(i,cx,slider)=>{const list=_scDraft[_scKey],t=slider.querySelector(".sc-track").getBoundingClientRect();let v=(cx-t.left)/t.width;v=Math.max(0,Math.min(1,v));list[i].w=Math.round(v*200)/200;_scUpdateRow(i);};
  body.addEventListener("pointerdown",e=>{const sl=e.target.closest(".sc-slider");if(!sl)return;
    const i=+sl.closest(".sc-row").dataset.i;_scDrag={i,sl};sl.setPointerCapture(e.pointerId);setFromX(i,e.clientX,sl);e.preventDefault();});
  body.addEventListener("pointermove",e=>{if(_scDrag)setFromX(_scDrag.i,e.clientX,_scDrag.sl);});
  body.addEventListener("pointerup",()=>{_scDrag=null;});
  body.addEventListener("pointercancel",()=>{_scDrag=null;});
  body.addEventListener("keydown",e=>{const sl=e.target.closest(".sc-slider");if(!sl)return;
    const list=_scDraft[_scKey],i=+sl.closest(".sc-row").dataset.i;let step=0;
    if(e.key==="ArrowRight"||e.key==="ArrowUp")step=0.005;else if(e.key==="ArrowLeft"||e.key==="ArrowDown")step=-0.005;
    else if(e.key==="PageUp")step=0.05;else if(e.key==="PageDown")step=-0.05;
    else if(e.key==="Home"){list[i].w=0;_scUpdateRow(i);e.preventDefault();return;}
    else if(e.key==="End"){list[i].w=1;_scUpdateRow(i);e.preventDefault();return;}else return;
    list[i].w=Math.max(0,Math.min(1,list[i].w+step));_scUpdateRow(i);e.preventDefault();});}

/* 로그인 — 비밀번호만으로 사용자 식별. cr_login이 {found,name,status,role,viewer} 반환:
   승인됨=데이터 열고 환영(권한별) · 신청함=승인 대기 · 거절됨=거절 안내 · 미존재=흔들기.

async function attemptLogin(pw){
  pw=(pw||"").trim();if(!pw)return "empty";
  let info;
  try{info=await sbRpc("cr_login",{p_pw:pw});}
  catch(e){toast("로그인 확인에 실패했어요 · "+(e.message||""));return "error";}
  if(!info||!info.found){toast("비밀번호가 맞지 않아요");return "wrong";}
  if(info.status==="신청함"){toast("아직 관리자 승인 대기 중이에요");return "pending";}
  if(info.status==="거절됨"){toast("가입이 거절된 계정이에요 · 관리자에게 문의해 주세요");return "rejected";}
  /* 승인됨 → 권한·이름 확정 (0715 뷰어는 이름 없음) */
  const viewer=!!info.viewer, name=viewer?"":(info.name||""), role=(info.role||"viewer");
  const editor=(role==="editor"||role==="admin"); /* 관리자는 에디터 권한 포함 */
  canEdit=editor; isAdmin=(role==="admin");
  uploaderId=name||null;try{if(name)localStorage.setItem("cr_uploader",name);else localStorage.removeItem("cr_uploader");}catch(_){}
  try{sessionStorage.setItem("crname",name);sessionStorage.setItem("crviewer",viewer?"1":"0");sessionStorage.setItem("crcan",editor?"1":"0");sessionStorage.setItem("crrole",role);}catch(_){}
  const ok=await cloudUnlock(pw,{name,viewer,editor});
  return ok?"ok":"error";}
