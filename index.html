<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>소재 성과</title>
<style>
  :root{
    --canvas:#ECECE7; --surface:#FFFFFF; --surface-2:#F4F4F0; --surface-3:#EDEDE7;
    --ink:#1B1A16; --muted:#74726A; --faint:#A4A299;
    --side:#1F1E18; --side-2:#2A2922; --side-ink:#EDEBE3; --side-muted:#9B998E; --side-faint:#6F6D63;
    --karrot:#FF6F0F; --karrot-2:#FF8A3D;
    /* tier fills (no borders, fill only) */
    --g2:#0F7355; --g2-f:#D3EEE3; --g1:#1C8A6E; --g1-f:#E0F1EA;
    --mid:#8A887E; --mid-f:#EBEBE4;
    --w1:#C2871C; --w1-f:#F7EBD0; --w2:#C73F54; --w2-f:#F8DCE1;
    --gold:#C8961A; --gold-f:#F7EDC9; --silver:#94969C; --silver-f:#EAEAEC; --bronze:#AE7740; --bronze-f:#F1E2CF;
    --c2:#3D5A80;
    --r:16px; --r-sm:10px;
    --sh:0 1px 2px rgba(20,20,15,.05), 0 8px 24px -16px rgba(20,20,15,.22);
    --sans:system-ui,-apple-system,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--canvas); color:var(--ink); font-family:var(--sans); font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased}
  .num{font-variant-numeric:tabular-nums; font-feature-settings:"tnum" 1}
  button{font:inherit; cursor:pointer; border:0; background:none}
  ::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:#cdccc4;border-radius:8px;border:3px solid transparent;background-clip:padding-box}

  .app{display:grid; grid-template-columns:248px 1fr; min-height:100vh}

  /* ===== sidebar (fill-based separation, dark) ===== */
  .side{background:var(--side); color:var(--side-ink); position:sticky; top:0; height:100vh; overflow:auto; display:flex; flex-direction:column; padding:20px 16px}
  /* level seg (sidebar) — vertical */
  .side .seg{display:flex;flex-direction:column;gap:4px;background:transparent;padding:0;border-radius:0}
  .side .seg button{display:flex;align-items:center;justify-content:space-between;gap:8px;width:100%;text-align:left;padding:10px 12px;border-radius:9px;background:transparent;color:var(--side-muted);font-size:13px;font-weight:650;transition:.12s;box-shadow:none}
  .side .seg button:hover{background:var(--side-2);color:var(--side-ink)}
  .side .seg button.on{background:var(--karrot);color:#fff;box-shadow:none}
  .side .seg button .sc{font-size:10.5px;font-weight:600;background:rgba(255,255,255,.08);color:var(--side-faint);padding:1px 7px;border-radius:6px;opacity:1}
  .side .seg button.on .sc{background:rgba(255,255,255,.22);color:#fff}
  /* media segment (sidebar, secondary) */
  .mseg{display:flex; flex-direction:column; gap:4px}
  .mseg button{display:flex; align-items:center; justify-content:space-between; gap:8px; width:100%; text-align:left; padding:9px 12px; border-radius:9px; color:var(--side-muted); font-size:13px; font-weight:650; transition:.12s}
  .mseg button:hover{background:var(--side-2); color:var(--side-ink)}
  .mseg button.on{background:rgba(255,255,255,.13); color:#fff}
  .mseg button .c{font-size:10.5px; font-weight:600; color:var(--side-faint); background:rgba(255,255,255,.06); padding:1px 7px; border-radius:6px}
  .mseg button.on .c{color:var(--side-ink); background:rgba(255,255,255,.12)}
  .mseg .solo{padding:9px 12px; font-size:13px; font-weight:650; color:#fff; display:flex; justify-content:space-between}
  .mseg .solo .c{font-size:10.5px;color:var(--side-faint)}

  .side-sec{margin-top:22px}
  .side-h{font-size:10.5px; font-weight:700; letter-spacing:.06em; color:var(--side-faint); text-transform:uppercase; padding:0 6px 9px}
  .skpi{display:flex; flex-direction:column; gap:14px; padding:2px 6px}
  .skpi .row{display:flex; flex-direction:column; gap:2px}
  .skpi .k{font-size:11.5px; color:var(--side-muted)}
  .skpi .v{font-size:20px; font-weight:740; letter-spacing:-.02em; color:#fff; line-height:1}
  .skpi .v .u{font-size:12px;font-weight:600;color:var(--side-muted);margin-left:1px}
  .skpi .s{font-size:10.5px; color:var(--side-faint); display:flex; align-items:center; gap:5px}
  .sdelta{font-weight:700;padding:0 5px;border-radius:5px;font-size:10px}
  .sdelta.up{color:#5FD0A8;background:rgba(95,208,168,.14)} .sdelta.down{color:#F58AA0;background:rgba(245,138,160,.14)} .sdelta.flat{color:var(--side-muted);background:rgba(255,255,255,.06)}
  .sgood{color:#5FD0A8}

  .side-foot{margin-top:auto; padding-top:20px; display:flex; flex-direction:column; gap:9px}
  .src{font-size:10.5px; color:var(--side-faint); padding:0 6px}
  .src b{color:var(--side-muted); font-weight:600}
  .sbtns{display:flex; gap:7px}
  .sbtn{flex:1; display:flex; align-items:center; justify-content:center; gap:6px; padding:9px; border-radius:9px; background:rgba(255,255,255,.07); color:var(--side-ink); font-size:12px; font-weight:600; transition:.13s}
  .sbtn:hover{background:rgba(255,255,255,.13)}
  .sbtn.pri{background:var(--karrot); color:#fff}.sbtn.pri:hover{background:#ff7d24}
  .sbtn svg{width:14px;height:14px}
  .snote{font-size:10px;color:var(--side-faint);padding:2px 6px 0;text-align:center}

  /* ===== main ===== */
  .main{min-width:0; display:flex; flex-direction:column}
  .content{padding:28px 30px 8px; display:flex; flex-direction:column; gap:20px}

  .card{background:var(--surface); border-radius:var(--r); box-shadow:var(--sh); padding:22px 24px}
  .card-h{display:flex; align-items:baseline; gap:10px; margin:0 0 16px}
  .card-h h2{font-size:16px; font-weight:740; margin:0; letter-spacing:-.01em}
  .card-h .meta{font-size:12px; color:var(--muted)} .card-h .meta b{color:var(--ink);font-weight:650}
  .sub-h{font-size:12px; font-weight:700; color:var(--muted); margin:18px 0 11px; letter-spacing:.01em}

  /* leaderboard — compact, width-capped */
  .ldr-g{margin-top:4px}
  .ldr-h{font-size:12px;font-weight:700;margin:0 0 9px;display:flex;align-items:center;gap:7px;color:var(--muted)}
  .ldr-h .dot{width:8px;height:8px;border-radius:50%}
  .ldr-h.good .dot{background:var(--g1)} .ldr-h.bad .dot{background:var(--w2)}
  .ldr-g + .ldr-g{margin-top:16px}
  .lead{display:flex;flex-wrap:wrap;gap:10px}
  .lcard{flex:1 1 230px;min-width:208px;max-width:308px;background:var(--surface-2);border-radius:var(--r-sm);padding:12px 13px;display:flex;flex-direction:column;gap:7px}
  .lcard.gold{background:var(--gold-f)} .lcard.bad{background:var(--w2-f)}
  .lhead{display:flex;align-items:flex-start;gap:8px}
  .rk{width:22px;height:22px;border-radius:50%;display:grid;place-items:center;font-weight:800;font-size:12px;color:#fff;flex:0 0 auto;margin-top:1px}
  .rk.g{background:var(--gold)} .rk.s{background:var(--silver)} .rk.b{background:var(--bronze)} .rk.r{background:var(--w2)}
  .lname{font-size:12.5px;font-weight:650;line-height:1.32;word-break:break-all;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;flex:1}
  .dom-pill{font-size:9px;font-weight:800;color:var(--gold);background:rgba(216,165,33,.16);padding:2px 6px;border-radius:5px;letter-spacing:.02em;white-space:nowrap;flex:0 0 auto;margin-top:1px}
  .lcard.gold .dom-pill{background:rgba(255,255,255,.5)}
  .dom-pill.bad{color:var(--w2);background:rgba(199,63,84,.14)} .lcard.bad .dom-pill.bad{background:rgba(255,255,255,.5)}
  .chips{display:flex;gap:5px;flex-wrap:wrap}
  .chip{font-size:10px;padding:2px 8px;border-radius:6px;background:var(--surface-3);color:var(--muted);font-weight:500}
  .lcard.gold .chip,.lcard.bad .chip{background:rgba(255,255,255,.55)}
  .chip.fo{background:var(--g1-f);color:var(--g1)} .lcard.gold .chip.fo,.lcard.bad .chip.fo{background:rgba(255,255,255,.6)}
  .lfoot{display:flex;align-items:center;gap:9px;margin-top:1px}
  .lfoot .sp{flex:0 0 auto;font-size:12.5px;padding:2px 8px}
  .lreason{font-size:11px;color:var(--muted);line-height:1.38} .lreason b{color:var(--ink);font-weight:650}

  /* analysis */
  .keyrow{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
  @media(max-width:760px){.keyrow{grid-template-columns:1fr}}
  .ktile{background:var(--surface-2);border-radius:var(--r-sm);padding:13px 15px}
  .ktile .kt-k{font-size:11px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:6px}
  .ktile .kt-k svg{width:14px;height:14px}
  .ktile .kt-v{font-size:14px;font-weight:700;margin-top:5px;letter-spacing:-.01em}
  .ktile .kt-s{font-size:11px;color:var(--muted);margin-top:3px}
  .ktile.g .kt-k{color:var(--g1)} .ktile.b .kt-k{color:var(--w2)} .ktile.n .kt-k{color:var(--c2)}

  svg.chart{display:block;overflow:visible;max-width:100%}
  .axis text{font-size:10px;fill:var(--faint)} .gl{stroke:#E6E5DE;stroke-dasharray:2 3}
  .qnote{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:12px;font-size:11px}
  .qnote div{padding:7px 10px;border-radius:8px;background:var(--surface-2)} .qnote b{font-weight:700}
  .qhint{font-size:11px;color:var(--faint);margin:0 0 6px}
  .twocol{display:grid;grid-template-columns:1fr 1fr;gap:24px}
  @media(max-width:760px){.twocol{grid-template-columns:1fr}}
  .leg{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--muted);margin-top:6px}
  .leg span{display:inline-flex;align-items:center;gap:5px}.leg i{width:10px;height:10px;border-radius:3px}
  .bd{display:grid;gap:9px}
  .bd-row{display:grid;grid-template-columns:96px 1fr auto;gap:10px;align-items:center;font-size:12px}
  .bd-row .lab{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .bd-bar{height:18px;border-radius:5px;background:var(--surface-2);overflow:hidden}
  .bd-bar i{display:block;height:100%;border-radius:5px;background:var(--karrot)}
  .bd-row .val{color:var(--muted);font-size:11px;white-space:nowrap}
  .dtog{display:flex;gap:5px;margin-bottom:12px}
  .dtog button{padding:4px 11px;border-radius:7px;background:var(--surface-2);color:var(--muted);font-size:11.5px;font-weight:600}
  .dtog button.on{background:var(--ink);color:#fff}

  /* table */
  .tbar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:12px}
  .tbar input{flex:0 0 auto;background:var(--surface-2);border-radius:9px;padding:8px 13px;font:inherit;font-size:12.5px;width:230px;max-width:50vw}
  .tbar input:focus{outline:2px solid var(--gold-f)}
  .chk{display:inline-flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);cursor:pointer;user-select:none}
  .chk input{width:15px;height:15px;accent-color:var(--karrot)}
  .tlegend{display:flex;gap:13px;flex-wrap:wrap;font-size:11px;color:var(--muted);margin-left:auto}
  .tlegend span{display:inline-flex;align-items:center;gap:5px}.tlegend svg{width:15px;height:15px}
  .tbl-scroll{overflow:auto;max-height:74vh;border-radius:10px;background:var(--surface-2)}
  table{border-collapse:separate;border-spacing:0;width:100%;font-size:12.5px}
  th,td{padding:9px 11px;text-align:right;white-space:nowrap}
  tbody td{background:var(--surface)}
  th.name,td.name{text-align:left;white-space:normal;min-width:230px}
  th.bdg,td.bdg{width:58px;padding-left:14px;text-align:left}
  thead th{position:sticky;top:0;background:var(--surface-2);z-index:3;font-weight:650;color:var(--muted);cursor:pointer;user-select:none}
  thead th.help{text-decoration:underline dotted #cfcdc4;text-underline-offset:3px}
  thead th.sorted{color:var(--karrot)}
  thead th .arr{opacity:.55;font-size:10px}
  tbody tr:hover td{background:#FBF8F4} tbody tr:hover td.name,tbody tr:hover td.bdg{background:#FBF8F4}
  tbody td{border-bottom:1px solid #F0EFE9}
  tbody tr.row{content-visibility:auto;contain-intrinsic-size:auto 38px}
  td.bdg .thumbs{display:inline-flex;gap:1px;align-items:center}
  td.bdg svg{width:16px;height:16px;vertical-align:middle}
  .thumbs svg{width:14px;height:14px}
  .b-g2{color:var(--g2)} .b-g1{color:var(--g1)} .b-mid{color:var(--faint)} .b-w1{color:var(--w1)} .b-w2{color:var(--w2)} .b-gold{color:var(--gold)}
  .sp{display:inline-block;min-width:32px;padding:2px 8px;border-radius:7px;font-weight:740;font-size:12px}
  .sp-g2{background:var(--g2-f);color:var(--g2)} .sp-g1{background:var(--g1-f);color:var(--g1)} .sp-mid{background:var(--mid-f);color:var(--mid)} .sp-w1{background:var(--w1-f);color:var(--w1)} .sp-w2{background:var(--w2-f);color:var(--w2)} .sp-na{color:var(--faint)}
  td.tg2{background:var(--g2-f)!important;color:var(--g2);font-weight:650} td.tg1{background:var(--g1-f)!important;color:var(--g1);font-weight:650}
  td.tw1{background:var(--w1-f)!important;color:var(--w1);font-weight:650} td.tw2{background:var(--w2-f)!important;color:var(--w2);font-weight:650}
  td.name .chips{margin-top:4px}
  td.bdg .dom-tag{font-size:9px;font-weight:800;color:var(--gold);background:var(--gold-f);padding:2px 6px;border-radius:5px;letter-spacing:.02em}
  tbody tr.row{cursor:pointer}
  tbody tr.exp>td{background:var(--gold-f)!important}
  .caret{color:var(--faint);font-weight:800;margin-left:7px;display:inline-block;transition:transform .15s;font-size:13px}
  tbody tr.exp .caret{transform:rotate(90deg);color:var(--karrot)}
  .isle-row>td{padding:0!important;background:var(--surface-2);border-bottom:1px solid #E6E5DE}
  .isle{position:sticky;left:0;box-sizing:border-box;padding:18px 20px;display:grid;grid-template-columns:1.12fr 1fr;gap:26px}
  @media(max-width:860px){.isle{grid-template-columns:1fr;gap:18px}}
  .isle-hd{grid-column:1/-1;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .isle-hd .nm{font-size:13.5px;font-weight:740;word-break:break-all}
  .isle-hd .sp{flex:0 0 auto}
  .ish{font-size:12px;font-weight:700;color:var(--muted);margin:0 0 11px;display:flex;align-items:baseline;gap:7px}
  .ish .n{font-size:11px;color:var(--faint);font-weight:500}
  .mtog{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:13px}
  .mtog button{padding:5px 11px;border-radius:8px;background:var(--surface-3);color:var(--muted);font-size:11.5px;font-weight:600}
  .mtog button.on{background:var(--ink);color:#fff}
  .pos{margin-bottom:14px}
  .pos-l{font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;margin-bottom:6px}
  .pos-l .pn{font-size:10.5px;color:var(--faint);font-weight:500;background:var(--surface-3);padding:0 6px;border-radius:5px}
  .pos-l .me{margin-left:auto;font-size:11.5px;font-weight:700}
  .pos-track{position:relative;height:8px;border-radius:5px;background:var(--surface-3)}
  .pos-fill{position:absolute;left:0;top:0;height:100%;border-radius:5px;opacity:.85}
  .pos-mark{position:absolute;top:50%;width:13px;height:13px;border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 0 3px var(--surface-2)}
  .pos-meta{font-size:11px;color:var(--muted);margin-top:5px} .pos-meta b{color:var(--ink);font-weight:650}
  .pos-na{font-size:11px;color:var(--faint);padding:2px 0 6px}
  .fam{background:var(--surface);border-radius:10px;overflow:hidden}
  .fam table{width:100%;border-collapse:collapse;font-size:12px}
  .fam th,.fam td{padding:7px 10px;text-align:right;border-bottom:1px solid #F0EFE9;white-space:nowrap}
  .fam tr:last-child td{border-bottom:0}
  .fam th{background:var(--surface-2);color:var(--muted);font-weight:600;font-size:11px;position:sticky;top:0}
  .fam th.l,.fam td.l{text-align:left}
  .fam tr.me td{background:var(--gold-f);font-weight:650}
  .fam .mb svg{width:13px;height:13px;vertical-align:middle}
  .fam-wrap{max-height:280px;overflow:auto;border-radius:10px}
  .fam-note{font-size:11px;color:var(--faint);margin-top:8px}

  .ft{padding:18px 30px 26px;font-size:11px;color:var(--faint)}
  /* glossary overlay */
  .ov{position:fixed;inset:0;background:rgba(20,20,15,.42);display:none;align-items:center;justify-content:center;z-index:80;padding:20px}
  .ov.show{display:flex}
  .ov-card{background:var(--surface);border-radius:var(--r);box-shadow:0 30px 80px -20px rgba(0,0,0,.4);max-width:680px;width:100%;padding:24px 26px}
  .ov-card h2{font-size:16px;margin:0 0 4px;font-weight:740}
  .ov-card .ov-sub{font-size:12px;color:var(--muted);margin:0 0 16px}
  .gloss-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 24px}
  @media(max-width:560px){.gloss-grid{grid-template-columns:1fr}}
  .gloss-grid div{font-size:12.5px;color:var(--muted)} .gloss-grid b{color:var(--ink);font-weight:650}
  .dir{font-size:10px;padding:1px 6px;border-radius:5px;margin-left:5px;font-weight:700;color:var(--g1);background:var(--g1-f)}
  .ov-close{margin-top:18px;display:flex;justify-content:flex-end}
  .ov-close button{padding:9px 18px;border-radius:9px;background:var(--ink);color:#fff;font-size:13px;font-weight:600}

  /* drop overlay */
  .drop-ov{position:fixed;inset:0;background:rgba(20,20,15,.55);display:none;align-items:center;justify-content:center;z-index:100;pointer-events:none}
  .drop-ov.show{display:flex}
  .drop-ov .box{background:var(--surface);border-radius:18px;padding:34px 52px;display:flex;flex-direction:column;align-items:center;gap:12px;box-shadow:0 30px 80px -20px rgba(0,0,0,.5);border:2px dashed var(--karrot)}
  .drop-ov .box svg{width:40px;height:40px;color:var(--karrot)}
  .drop-ov .box b{font-size:16px;font-weight:740;letter-spacing:-.01em}
  .drop-ov .box span{font-size:12.5px;color:var(--muted)}
  .tooltip{position:fixed;pointer-events:none;background:var(--ink);color:#fff;padding:8px 11px;border-radius:9px;font-size:11.5px;line-height:1.45;box-shadow:0 8px 24px -8px rgba(0,0,0,.45);opacity:0;transition:opacity .1s;z-index:90;max-width:280px}
  .tooltip .t-k{color:rgba(255,255,255,.6)}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 18px;border-radius:11px;font-size:13px;opacity:0;transition:.25s;z-index:95}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* responsive shell */
  @media(max-width:900px){
    .app{grid-template-columns:1fr}
    .side{position:static;height:auto;flex-direction:column}
    .mseg{flex-direction:row;flex-wrap:wrap}
    .mseg button{flex:0 1 auto}
    .side-sec{margin-top:16px}
    .skpi{flex-direction:row;flex-wrap:wrap;gap:18px}
    .side-foot{margin-top:16px}
    .content{padding:18px 18px 4px}.card{padding:18px}
  }
  @media(max-width:760px){.isle{grid-template-columns:1fr;gap:18px}}
  @media (prefers-reduced-motion: reduce){*{transition:none!important}}
  :focus-visible{outline:2px solid var(--karrot);outline-offset:2px;border-radius:4px}
</style>
</head>
<body>
<div class="app">
  <!-- SIDEBAR: identity + media + summary + actions -->
  <aside class="side">
    <div class="side-sec" style="margin-top:2px">
      <div class="side-h">레벨</div>
      <div class="seg" id="seg" role="tablist"></div>
    </div>
    <div class="side-sec">
      <div class="side-h">매체</div>
      <div class="mseg" id="mseg"></div>
    </div>
    <div class="side-sec">
      <div class="side-h">요약 (이 매체)</div>
      <div class="skpi" id="skpi"></div>
    </div>
    <div class="side-foot">

  cg:{key:"cg",name:"크리에이티브 그룹",sub:"메시지 묶음",nameCol:"creative_group_name",hasConv:false,effCol:"CPC",effLabel:"CPC",volCol:"클릭 수",volLab:"클릭",scope:"메시지 묶음 · CTR(클릭률)로 효율 판단"},
  adset:{key:"adset",name:"광고세트",sub:"매체·예산",nameCol:"adset_name",hasConv:true,effCol:"활성 유저 eCPA",effLabel:"활성 eCPA",volCol:"활성 유저 수",volLab:"활성유저",scope:"매체·예산 단위 · 활성 eCPA로 효율 판단"},
};
const TAB_ORDER=["ad","cg","adset"];
function detect(h){const s=new Set(h);if(s.has("adset_name"))return"adset";if(s.has("creative_group_name"))return"cg";if(s.has("ad_name"))return"ad";return null;}

const VERTICALS=[[/fleamarket|flemarket|중고|sellitems|declutter|nocommission|simbatdan/i,"중고거래"],[/realty|부동산|rentkarrot|lifedaangn/i,"부동산"],[/localbiz|biz_|동네|realdaangn/i,"동네업체"],[/jobs|알바|baro_running/i,"알바"],[/branding|brand/i,"브랜딩"]];
function tagEntity(name){const t={ch:null,ve:null,fo:null,size:null};if(!name)return t;
  t.ch=/google/i.test(name)?"Google":/moloco|molco/i.test(name)?"Moloco":/meta|facebook|instagram/i.test(name)?"Meta":null;
  for(const[re,l]of VERTICALS){if(re.test(name)){t.ve=l;break;}}
  if(/\.mp4|(^|_)vid/i.test(name))t.fo="영상";else if(/\.png|\.jpe?g|(^|_)img/i.test(name))t.fo="이미지";
  const m=name.match(/(\d{3,4})\s*[x×]\s*(\d{3,4})/);if(m)t.size=m[1]+"×"+m[2];return t;}
function fileChannel(fname){if(!fname)return null;const f=String(fname).toLowerCase();
  if(/moloco|molco/.test(f))return "Moloco";
  if(/google/.test(f))return "Google";
  if(/meta|facebook|instagram/.test(f))return "Meta";
  const stem=String(fname).replace(/\.csv$/i,"").replace(/[_\-]+/g," ").trim();
  if(!stem||/^[0-9a-f.\s]+$/i.test(stem))return "업로드";
  return stem.length<=24?stem:"업로드";}

let WEEKS=["2026-06-01","2026-06-08","2026-06-15","2026-06-22"];
function setWeeksFromDatasets(){const s=new Set();
  for(const arr of arguments){for(const r of arr){if(r&&r.date)s.add(r.date);}}
  const a=[...s].sort();if(a.length>=4)WEEKS=a.slice(-4);else if(a.length)WEEKS=a;}
function aggregate(data,L){const map=new Map();
  for(const r of data){let nm=r[L.nameCol];if(nm==null||nm===""||nm==="nan")nm="(미지정)";
    if(!map.has(nm))map.set(nm,{name:nm,비용:0,"노출 수":0,"클릭 수":0,"어트리뷰션 수":0,"활성 유저 수":0,weeks:Object.fromEntries(WEEKS.map(w=>[w,{비용:0,"클릭 수":0,"어트리뷰션 수":0,"활성 유저 수":0}]))});
    const e=map.get(nm);for(const c of["비용","노출 수","클릭 수","어트리뷰션 수","활성 유저 수"]){const v=num(r[c]);if(v!=null)e[c]+=v;}
    const w=r.date;if(e.weeks[w])for(const c of["비용","클릭 수","어트리뷰션 수","활성 유저 수"]){const v=num(r[c]);if(v!=null)e.weeks[w][c]+=v;}}
  const arr=[...map.values()].map(e=>{e.CPC=e["클릭 수"]>0?e.비용/e["클릭 수"]:null;e.CTR=e["노출 수"]>0?e["클릭 수"]/e["노출 수"]:null;e.eCPI=e["어트리뷰션 수"]>0?e.비용/e["어트리뷰션 수"]:null;e["활성 유저 eCPA"]=e["활성 유저 수"]>0?e.비용/e["활성 유저 수"]:null;e.tags=tagEntity(e.name);return e;});
  arr.sort((a,b)=>b.비용-a.비용);return arr;}
function weeklyTotals(data){const t=Object.fromEntries(WEEKS.map(w=>[w,{비용:0,"클릭 수":0,"어트리뷰션 수":0,"활성 유저 수":0,"노출 수":0}]));
  for(const r of data){const w=r.date;if(!t[w])continue;for(const c of["비용","클릭 수","어트리뷰션 수","활성 유저 수","노출 수"]){const v=num(r[c]);if(v!=null)t[w][c]+=v;}}
  return WEEKS.map(w=>({week:w,...t[w]}));}
function quantile(s,q){if(!s.length)return null;const p=(s.length-1)*q,b=Math.floor(p),r=p-b;return s[b+1]!==undefined?s[b]+r*(s[b+1]-s[b]):s[b];}
function minVol(L){return L.key==="ad"?60:L.key==="adset"?500:1000;}
function pctRank(s,v){if(s.length<=1)return .5;let i=0;while(i<s.length&&s[i]<v)i++;return i/(s.length-1);}

/* scoring + 5-tier badges */
function computeScores(ds){const L=ds.L,a=ds.agg;
  let goodCol,goodDir,goodLabel,goodFmt,goodHelp;
  if(L.key==="cg"){goodCol="CTR";goodDir=1;goodLabel="CTR";goodFmt="pct";goodHelp="높을수록 좋음";}
  else{goodCol=L.effCol;goodDir=-1;goodLabel=L.effLabel;goodFmt="won";goodHelp="낮을수록 좋음";}
  const volCol=L.volCol,minV=minVol(L);
  a.forEach(e=>{e.score=null;e.tier="na";e.dom=null;});
  const elig=a.filter(e=>e.비용>0&&e[goodCol]!=null&&(e[volCol]||0)>=minV);
  const gv=elig.map(e=>e[goodCol]).sort((x,y)=>x-y),vv=elig.map(e=>e[volCol]).sort((x,y)=>x-y),med=quantile(gv,0.5);
  elig.forEach(e=>{let gp=goodDir<0?1-pctRank(gv,e[goodCol]):pctRank(gv,e[goodCol]);let vp=pctRank(vv,e[volCol]);e.score=Math.round(100*(0.7*gp+0.3*vp));});
  const sc=elig.map(e=>e.score).sort((x,y)=>x-y);
  elig.forEach(e=>{const p=pctRank(sc,e.score);e.tier=p>=0.8?"g2":p>=0.6?"g1":p>=0.4?"m":p>=0.2?"w1":"w2";});
  const best=elig.slice().sort((x,y)=>y.score-x.score);
  const medSpend=quantile(a.map(x=>x.비용).sort((p,q)=>p-q),0.5);
  let pool=elig.filter(e=>e.비용>=medSpend);if(pool.length<2)pool=elig.slice();
  const worst=goodDir<0?pool.slice().sort((x,y)=>y[goodCol]-x[goodCol]):pool.slice().sort((x,y)=>x[goodCol]-y[goodCol]);
  if(best[0]){const r=goodDir<0?med/best[0][goodCol]:best[0][goodCol]/med;best[0].dom=r>=1.8?"good":null;}
  if(worst[0]){const r=goodDir<0?worst[0][goodCol]/med:med/worst[0][goodCol];worst[0].dom=r>=2?"bad":null;}
  return{best,worst,med,goodCol,goodDir,goodLabel,goodFmt,goodHelp,volCol,eligCount:elig.length};}
function degText(e,S){const g=e[S.goodCol],med=S.med;if(g==null||med==null||med<=0)return"";
  if(S.goodDir<0){const m=med/g;return m>=1.05?`평균(${fmtWon(med)})보다 <b>${m.toFixed(1)}배 효율적</b>`:`평균보다 <b>${(g/med).toFixed(1)}배 비쌈</b>`;}
  const m=g/med;return m>=1.05?`평균(${fmtPct(med)})의 <b>${m.toFixed(1)}배</b>`:`평균보다 <b>낮음</b>`;}
function gv(e,S){return S.goodFmt==="pct"?fmtPct(e[S.goodCol]):fmtWon(e[S.goodCol]);}

/* sidebar KPIs */
function renderSideKpis(ds){const a=ds.data,L=ds.L,sum=c=>a.reduce((s,r)=>s+(num(r[c])||0),0);
  const tC=sum("비용"),tClk=sum("클릭 수"),tAttr=sum("어트리뷰션 수"),tAct=sum("활성 유저 수");
  const wk=ds.weekly,last=wk.at(-1)||{},prev=wk.length>=2?wk.at(-2):null,d=c=>(prev&&prev[c]>0)?(last[c]-prev[c])/prev[c]:null;
  const rows=[{k:"총 광고비",v:fmtKRW(tC),u:"원",s:sdelta(d("비용"))}];
  if(L.hasConv){rows.push({k:"총 설치",v:fmtInt(tAttr),s:sdelta(d("어트리뷰션 수"))},
    {k:"평균 eCPI",v:fmtWon(tAttr>0?tC/tAttr:null),s:`<span class="sgood">설치당 · 낮을수록 ↓</span>`},
    {k:"총 활성 유저",v:fmtInt(tAct),s:sdelta(d("활성 유저 수"))},
    {k:"활성 eCPA",v:fmtWon(tAct>0?tC/tAct:null),s:`<span class="sgood">유저당 · 낮을수록 ↓</span>`});
  }else{const cov=a.filter(r=>(num(r["노출 수"])||0)>0),ci=cov.reduce((s,r)=>s+(num(r["노출 수"])||0),0),cc=cov.reduce((s,r)=>s+(num(r["클릭 수"])||0),0);
    rows.push({k:"총 클릭",v:fmtInt(tClk),s:sdelta(d("클릭 수"))},
    {k:"평균 CTR",v:fmtPct(ci>0?cc/ci:null),s:`<span class="sgood">클릭률 · 높을수록 ↑</span>`},
    {k:"평균 CPC",v:fmtWon(tClk>0?tC/tClk:null),s:`<span class="sgood">클릭당 · 낮을수록 ↓</span>`});}
  $("#skpi").innerHTML=rows.map(r=>`<div class="row"><div class="k">${r.k}</div><div class="v num">${r.v}${r.u?`<span class="u">${r.u}</span>`:""}</div><div class="s num">${r.s||""}</div></div>`).join("");}
function sdelta(dd){if(dd==null)return"<span>지난주 –</span>";const c=Math.abs(dd)<0.005?"flat":dd>0?"up":"down";return `<span class="sdelta ${c}">${dd>0?"+":""}${(dd*100).toFixed(1)}%</span><span>지난주</span>`;}

/* leaderboard */
function chipsHTML(t){return [t.ve&&`<span class="chip">${t.ve}</span>`,t.fo&&`<span class="chip fo">${t.fo}</span>`,t.size&&`<span class="chip">${t.size}</span>`].filter(Boolean).join("");}
function renderLeaderboard(ds){const L=ds.L,S=ds.S;
  $("#rankMeta").innerHTML=`이 매체 안에서 · 기준 <b>${S.goodLabel}</b>(${S.goodHelp}) + 규모`;
  const best=S.best.slice(0,3),worst=S.worst.slice(0,3).filter(w=>!best.includes(w));
  const sp=t=>t==="g2"?"sp-g2":t==="g1"?"sp-g1":t==="m"?"sp-mid":t==="w1"?"sp-w1":t==="w2"?"sp-w2":"sp-na";
  if(!best.length){$("#best").innerHTML=`<div class="lcard"><div class="lreason">순위를 매길 데이터가 부족합니다 (이 매체에서 최소 ${L.volLab} ${minVol(L)}건 이상 필요).</div></div>`;$("#worst").innerHTML="";$("#worstG").style.display="none";return;}
  const rk=["g","s","b"];
  $("#best").innerHTML=best.map((e,i)=>{const dom=i===0&&e.dom==="good";
    return `<div class="lcard ${dom?"gold":""}"><div class="lhead"><span class="rk ${rk[i]}">${i+1}</span><span class="lname">${e.name}</span>${dom?'<span class="dom-pill">독보적</span>':""}</div>
      <div class="chips">${chipsHTML(e.tags)}</div>
      <div class="lfoot"><span class="sp ${sp(e.tier)}">${e.score}</span><span class="lreason">${S.goodLabel} <b>${gv(e,S)}</b> · ${degText(e,S)}</span></div></div>`;}).join("");
  $("#worstG").style.display=worst.length?"":"none";
  $("#worst").innerHTML=worst.map((e,i)=>{const dom=i===0&&e.dom==="bad";
    return `<div class="lcard bad"><div class="lhead"><span class="rk r">${i+1}</span><span class="lname">${e.name}</span>${dom?'<span class="dom-pill bad">독보적 나쁨</span>':""}</div>
      <div class="chips">${chipsHTML(e.tags)}</div>
      <div class="lfoot"><span class="sp ${sp(e.tier)}">${e.score??"–"}</span><span class="lreason">${S.goodLabel} <b>${gv(e,S)}</b> · ${degText(e,S)}</span></div></div>`;}).join("");}

/* key summary tiles */
function renderKeyrow(ds){const L=ds.L,a=ds.agg,tiles=[];
  const volK=L.hasConv?L.volCol:"클릭 수",szLab=L.hasConv?L.volLab+"당":"클릭당";
  function bestDim(key){const g={};a.forEach(e=>{const k=e.tags[key];if(!k)return;(g[k]=g[k]||{비용:0,v:0});g[k].비용+=e.비용;g[k].v+=e[volK]||0;});
    const arr=Object.entries(g).filter(([,o])=>o.v>0&&o.비용>0).map(([k,o])=>({k,eff:o.비용/o.v}));if(arr.length<2)return null;arr.sort((x,y)=>x.eff-y.eff);return{best:arr[0],worst:arr[arr.length-1],n:arr.length};}
  if(L.key==="ad"){const fo=bestDim("fo");if(fo)tiles.push({cls:"g",ic:"film",k:"포맷 우위",v:fo.best.k,s:`${szLab} ${fmtWon(fo.best.eff)} · ${fo.worst.k} ${fmtWon(fo.worst.eff)}`});}
  const sz=bestDim("size");if(sz)tiles.push({cls:"g",ic:"grid",k:"사이즈 우위",v:sz.best.k,s:`${szLab} ${fmtWon(sz.best.eff)} · ${sz.n}개 사이즈 중 1위`});
  const wk=ds.weekly,last=wk.at(-1),prev=wk.length>=2?wk.at(-2):null;
  if(last&&prev&&prev.비용>0){const cd=(last.비용-prev.비용)/prev.비용;let cls="n",v="비용 "+(cd>=0?"+":"")+(cd*100).toFixed(0)+"%",s="지난주 대비";
    if(L.hasConv){const eL=last[L.volCol]>0?last.비용/last[L.volCol]:null,eP=prev[L.volCol]>0?prev.비용/prev[L.volCol]:null;if(eL!=null&&eP!=null){const ed=(eL-eP)/eP;cls=ed>0.05?"b":"g";s=`${L.effLabel} ${fmtWon(eP)}→${fmtWon(eL)} (${ed>0?"나빠짐":"좋아짐"})`;}}
    tiles.push({cls,ic:"trend",k:"이번 주 흐름",v,s});}
  if(tiles.length<3){const ve=bestDim("ve");if(ve)tiles.push({cls:"g",ic:"swap",k:"서비스 우위",v:ve.best.k,s:`${szLab} ${fmtWon(ve.best.eff)} · ${ve.n}개 중 1위`});}
  if(tiles.length<3){const noImp=ds.data.filter(r=>(num(r["노출 수"])||0)===0).length,t=ds.data.length;if(t&&noImp/t>0.3)tiles.push({cls:"n",ic:"info",k:"데이터 참고",v:`노출 ${Math.round(noImp/t*100)}% 미보고`,s:"eCPI 기준으로 판단"});}
  $("#keyrow").innerHTML=tiles.slice(0,3).map(t=>`<div class="ktile ${t.cls}"><div class="kt-k">${ICON[t.ic]||""}${t.k}</div><div class="kt-v">${t.v}</div><div class="kt-s">${t.s}</div></div>`).join("");}

/* quadrant */
function renderQuad(ds){const L=ds.L,S=ds.S,svg=$("#quad");
  const W=Math.max(360,Math.min((svg.parentElement&&svg.parentElement.clientWidth)||760,1180)),H=400,pad={l:66,r:38,t:16,b:44};
  svg.setAttribute("width",W);svg.setAttribute("height",H);svg.setAttribute("viewBox",`0 0 ${W} ${H}`);
  const ec=S.goodCol,dir=S.goodDir;let pts=ds.agg.filter(e=>e.비용>0&&e[ec]!=null&&(e[S.volCol]||0)>=Math.max(1,minVol(L)/3));
  pts.sort((a,b)=>b.비용-a.비용);const CAP=L.key==="ad"?70:160,capped=pts.length>CAP;pts=pts.slice(0,CAP);
  $("#qhint").textContent=`효율 지도 — 가로축 광고비, 세로축 ${S.goodLabel}(${S.goodHelp}), 원 크기 ${L.volLab}${capped?` · 광고비 상위 ${CAP}`:""}`;
  if(pts.length<3){svg.innerHTML=`<text x="${W/2}" y="${H/2}" text-anchor="middle" fill="var(--faint)" font-size="13">지도를 그릴 데이터가 부족합니다</text>`;$("#qnote").innerHTML="";return;}
  const xs=pts.map(p=>p.비용),ys=pts.map(p=>p[ec]),xmax=Math.max(...xs)*1.12,ymax=Math.max(...ys)*1.1;
  const xmed=quantile([...xs].sort((a,b)=>a-b),0.5),ymed=quantile([...ys].sort((a,b)=>a-b),0.5),vmax=Math.max(...pts.map(p=>p[S.volCol]||0))||1;
  const X=v=>pad.l+(v/xmax)*(W-pad.l-pad.r),Y=v=>H-pad.b-(v/ymax)*(H-pad.t-pad.b),R=v=>4+Math.sqrt((v||0)/vmax)*16;
  let s=`<g class="axis">`;
  for(let i=0;i<=4;i++){const gx=pad.l+i/4*(W-pad.l-pad.r);s+=`<line class="gl" x1="${gx}" y1="${pad.t}" x2="${gx}" y2="${H-pad.b}"/><text x="${gx}" y="${H-pad.b+16}" text-anchor="middle">${fmtKRW(i/4*xmax)}</text>`;}
  for(let i=0;i<=4;i++){const gy=H-pad.b-i/4*(H-pad.t-pad.b);s+=`<line class="gl" x1="${pad.l}" y1="${gy}" x2="${W-pad.r}" y2="${gy}"/><text x="${pad.l-8}" y="${gy+3}" text-anchor="end">${S.goodFmt==="pct"?fmtPct(i/4*ymax):fmtWon(i/4*ymax)}</text>`;}
  s+=`</g><line x1="${X(xmed)}" y1="${pad.t}" x2="${X(xmed)}" y2="${H-pad.b}" stroke="#D8D6CC"/><line x1="${pad.l}" y1="${Y(ymed)}" x2="${W-pad.r}" y2="${Y(ymed)}" stroke="#D8D6CC"/>`;
  const good=v=>dir<0?v<=ymed:v>=ymed;
  pts.forEach((p,i)=>{const cx=X(p.비용),cy=Y(p[ec]),r=R(p[S.volCol]),g=good(p[ec]),big=p.비용>=xmed;let col=g?(big?"var(--g1)":"var(--karrot)"):(big?"var(--w2)":"var(--w1)");
    s+=`<circle class="qb" data-i="${i}" cx="${cx}" cy="${cy}" r="${r}" fill="${col}" fill-opacity="0.58" stroke="${col}" stroke-width="1.2"/>`;});
  const placed=[];pts.slice(0,3).forEach(p=>{const r=R(p[S.volCol]);let lx=X(p.비용),anchor="middle";if(lx>W-pad.r-70){lx=W-pad.r-2;anchor="end";}else if(lx<pad.l+44){lx=pad.l+2;anchor="start";}let ly=Y(p[ec])-r-5;placed.forEach(q=>{if(Math.abs(lx-q.x)<92&&Math.abs(ly-q.y)<13)ly=q.y-13;});placed.push({x:lx,y:ly});s+=`<text x="${lx}" y="${Math.max(ly,12)}" text-anchor="${anchor}" font-size="9.5" fill="var(--ink)" font-weight="600">${trunc(p.name,15)}</text>`;});
  svg.innerHTML=s;
  svg.querySelectorAll(".qb").forEach(c=>{c.addEventListener("mousemove",e=>{const p=pts[+c.dataset.i];showTip(`<b>${p.name}</b><br><span class="t-k">광고비</span> ${fmtWon(p.비용)}<br><span class="t-k">${S.goodLabel}</span> ${gv(p,S)}<br><span class="t-k">${L.volLab}</span> ${fmtInt(p[S.volCol])}`,e.clientX,e.clientY);});c.addEventListener("mouseleave",hideTip);});
  $("#qnote").innerHTML=`<div><b style="color:var(--g1)">● 잘 나가는 ${L.name}</b> — 돈도 효율도 좋음. 유지·확대.</div><div><b style="color:var(--w2)">● 돈 쓰는데 약함</b> — 우선 손볼 곳.</div><div><b style="color:var(--karrot)">● 싸게 잘 나옴</b> — 더 밀어볼 만함.</div><div><b style="color:var(--w1)">● 성과 약함</b> — 정리 후보.</div>`;}

/* trend */
function renderTrend(ds){const svg=$("#trend"),L=ds.L,S=ds.S;

function renderMediaSeg(ds){const list=mediaList(ds),el=$("#mseg"),cnt=c=>ds.aggAll.filter(e=>(e.tags.ch||"기타")===c).length;
  if(list.length<=1){el.innerHTML=`<div class="solo">${list[0]||"—"}<span class="c">${list[0]?cnt(list[0]):0}</span></div>`;return;}
  el.innerHTML=list.map(c=>`<button data-m="${c}" class="${c===ds.media?"on":""}">${c}<span class="c">${cnt(c)}</span></button>`).join("");
  $$("#mseg button").forEach(b=>b.onclick=()=>setMedia(b.dataset.m));}
function renderFooter(){$("#ft").textContent="모든 계산은 브라우저 안에서 수행 · 매체별로 분리해 매체 내에서만 비교·순위 · 효율 = 총비용÷총전환 가중 집계 · 비용 0(미집행)은 표에서 기본 숨김";}
function refreshAll(){if(!active||!DATASETS[active])active=TAB_ORDER.find(k=>DATASETS[k])||Object.keys(DATASETS)[0];renderSeg();if(active)setActive(active);}

function loadEmbedded(){const map={"csv-ad":"내장 샘플(소재)","csv-cg":"내장 샘플(그룹)","csv-adset":"내장 샘플(광고세트)"};
  const sets=[];["csv-ad","csv-cg","csv-adset"].forEach(id=>{const raw=document.getElementById(id).textContent.trim();if(!raw||raw.startsWith("__CSV"))return;const r=parseCSV(raw);sets.push({id,headers:r.headers,data:r.data});});
  setWeeksFromDatasets(...sets.map(s=>s.data));
  sets.forEach(s=>ingest(s.headers,s.data,map[s.id],{byName:true}));}
function resetAll(){Object.keys(DATASETS).forEach(k=>delete DATASETS[k]);active=null;bdDim=null;tableShowAll=false;
  tState={sort:"score",dir:-1,q:""};ISLE.name=null;ISLE.metric=null;
  const s=$("#search");if(s)s.value="";const a=$("#showAll");if(a)a.checked=false;}
function handleFiles(files){const arr=[...files];let pending=arr.length;if(!pending)return;
  const parsed=[],failed=[];
  function done(){
    if(!parsed.length){toast("CSV 형식을 알 수 없음 — ad_name/creative_group_name/adset_name 컬럼이 필요");return;}
    resetAll();setWeeksFromDatasets(...parsed.map(p=>p.data));const loaded=[],chs=new Set();
    parsed.forEach(p=>{const k=ingest(p.headers,p.data,p.fname);if(k){loaded.push(LEVELS[k].name);const c=fileChannel(p.fname);if(c)chs.add(c);}});
    refreshAll();const chTxt=chs.size?` · ${[...chs].join("/")}`:"";
    toast("교체됨: "+loaded.join(", ")+chTxt+(failed.length?` · 건너뜀 ${failed.length}건`:""));
  }
  arr.forEach(f=>{const rd=new FileReader();
    rd.onload=()=>{const r=parseCSV(rd.result);const k=detect(r.headers);
      if(k)parsed.push({headers:r.headers,data:r.data,fname:f.name});else failed.push(f.name);
      if(--pending===0)done();};
    rd.onerror=()=>{failed.push(f.name);if(--pending===0)done();};
    rd.readAsText(f,"utf-8");});}
const fileInput=$("#file"),dropOv=$("#dropOv");
fileInput.addEventListener("change",e=>handleFiles(e.target.files));
let _dragDepth=0;
function _hasFiles(e){return e.dataTransfer&&[...e.dataTransfer.types||[]].includes("Files");}
document.addEventListener("dragenter",e=>{if(!_hasFiles(e))return;e.preventDefault();_dragDepth++;if(dropOv)dropOv.classList.add("show");});
document.addEventListener("dragover",e=>{if(!_hasFiles(e))return;e.preventDefault();});
document.addEventListener("dragleave",e=>{if(!_hasFiles(e))return;_dragDepth--;if(_dragDepth<=0){_dragDepth=0;if(dropOv)dropOv.classList.remove("show");}});
document.addEventListener("drop",e=>{e.preventDefault();_dragDepth=0;if(dropOv)dropOv.classList.remove("show");if(e.dataTransfer&&e.dataTransfer.files.length)handleFiles(e.dataTransfer.files);});
let _sq;$("#search").addEventListener("input",e=>{const v=e.target.value;clearTimeout(_sq);_sq=setTimeout(()=>{tState.q=v;if(active)renderTable(DATASETS[active]);},120);});
$("#showAll").addEventListener("change",e=>{tableShowAll=e.target.checked;if(active)renderTable(DATASETS[active]);});
$("#table tbody").addEventListener("click",e=>{const tr=e.target.closest("tr");if(!tr||tr.classList.contains("isle-row"))return;const nm=tr.getAttribute("data-name");if(nm==null||!curDS)return;toggleIsland(curDS,nm,tr);});
let rz;addEventListener("resize",()=>{clearTimeout(rz);rz=setTimeout(()=>{if(active&&DATASETS[active]){renderQuad(DATASETS[active]);renderTrend(DATASETS[active]);}const inner=document.querySelector(".isle"),sc=document.querySelector(".tbl-scroll");if(inner&&sc)inner.style.width=sc.clientWidth+"px";},140);});

renderGlossary();renderFooter();loadEmbedded();refreshAll();
</script>
