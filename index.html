<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>소재 성과</title>
<style>
  :root{
    --canvas:#ECECE7; --surface:#FFFFFF; --surface-2:#F4F4F0; --surface-3:#EDEDE7;
    --ink:#1B1A16; --muted:#74726A; --faint:#A4A299;
    --side:#1F1E18; --side-2:#2A2922; --side-ink:#EDEBE3; --side-muted:#9B998E; --side-faint:#6F6D63;
    --karrot:#FF6F0F; --karrot-2:#FF8A3D; --karrot-f:#FFEDDF;
    /* tier fills (no borders, fill only) */
    --g2:#1E88E5; --g2-f:#D6ECFB; --g1:#1C8A6E; --g1-f:#E0F1EA;
    --mid:#8A887E; --mid-f:#EBEBE4;
    --w1:#C2871C; --w1-f:#F7EBD0; --w2:#C73F54; --w2-f:#F8DCE1;
    --gold:#C8961A; --gold-f:#F7EDC9; --silver:#94969C; --silver-f:#EAEAEC; --bronze:#AE7740; --bronze-f:#F1E2CF;
    --c2:#3D5A80;
    --r:16px; --r-sm:10px;
    --sh:0 1px 2px rgba(20,20,15,.05), 0 8px 24px -16px rgba(20,20,15,.22);
    --sans:system-ui,-apple-system,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--canvas); color:var(--ink); font-family:var(--sans); font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased}
  .num{font-variant-numeric:tabular-nums; font-feature-settings:"tnum" 1}
  button{font:inherit; cursor:pointer; border:0; background:none}
  ::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:#cdccc4;border-radius:8px;border:3px solid transparent;background-clip:padding-box}

  .app{display:grid; grid-template-columns:248px 1fr; min-height:100vh}

  /* ===== sidebar (fill-based separation, dark) ===== */
  .side{background:var(--side); color:var(--side-ink); position:sticky; top:0; height:100vh; overflow-x:hidden; overflow-y:auto; display:flex; flex-direction:column; padding:20px 14px; min-width:0}
  .side *{min-width:0}
  .side-h-sub{color:var(--side-faint);font-weight:600;font-size:9.5px;text-transform:none;letter-spacing:0;margin-left:4px}
  .mseg{display:flex;flex-direction:column;gap:3px}
  .mseg button{display:flex;align-items:center;justify-content:space-between;gap:8px;width:100%;text-align:left;padding:8px 11px;border-radius:8px;background:transparent;color:var(--side-muted);font-size:12px;font-weight:650;transition:.12s}
  .mseg button:hover{background:var(--side-2);color:var(--side-ink)}
  .mseg button.on{background:rgba(255,255,255,.13);color:#fff}
  .mseg button .c{font-size:10px;font-weight:600;color:var(--side-faint);background:rgba(255,255,255,.06);padding:1px 6px;border-radius:5px}
  .mseg button.on .c{color:#fff;background:rgba(255,255,255,.14)}
  /* sidebar leaderboard */
  .srank{display:flex;flex-direction:column;gap:2px;padding:0 2px}
  .srank-h{font-size:9.5px;font-weight:800;letter-spacing:.08em;color:var(--side-faint);margin-top:8px;padding:0 4px 4px}
  .srank-h.good{color:#5FD0A8} .srank-h.bad{color:#F58AA0}
  .srk-row{display:grid;grid-template-columns:20px 1fr;column-gap:8px;align-items:start;padding:6px 4px;border-radius:7px;cursor:pointer;transition:background .12s}
  .srk-row:hover{background:rgba(255,255,255,.06)}
  .srk-row+.srk-row{border-top:1px solid rgba(255,255,255,.05)}
  .srk-rank{width:20px;height:20px;border-radius:5px;display:grid;place-items:center;font-size:10.5px;font-weight:800;background:rgba(255,255,255,.12);color:#fff;margin-top:1px}
  .srk-row.bad .srk-rank{background:rgba(245,138,160,.22);color:#F58AA0}
  .srk-name{color:#fff;font-weight:650;font-size:11.5px;line-height:1.3;word-break:break-all;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .srk-meta{grid-column:2;color:var(--side-muted);font-size:10.5px;line-height:1.45;margin-top:2px;word-break:break-all}
  .srk-meta b{color:#fff;font-weight:650}
  .srk-meta .sp{padding:1px 5px;border-radius:4px;font-size:9.5px;font-weight:800;margin-right:5px;vertical-align:1px}
  .srk-empty{font-size:10.5px;color:var(--side-faint);padding:6px 4px}
  /* level seg (sidebar) — vertical */
  .side .seg{display:flex;flex-direction:column;gap:4px;background:transparent;padding:0;border-radius:0}
  .side .seg button{display:flex;align-items:center;justify-content:space-between;gap:8px;width:100%;text-align:left;padding:10px 12px;border-radius:9px;background:transparent;color:var(--side-muted);font-size:13px;font-weight:650;transition:.12s;box-shadow:none}
  .side .seg button:hover{background:var(--side-2);color:var(--side-ink)}
  .side .seg button.on{background:var(--karrot);color:#fff;box-shadow:none}
  .side .seg button .sc{font-size:10.5px;font-weight:600;background:rgba(255,255,255,.08);color:var(--side-faint);padding:1px 7px;border-radius:6px;opacity:1}
  .side .seg button.on .sc{background:rgba(255,255,255,.22);color:#fff}
  .side-sec{margin-top:22px}
  .side-h{font-size:10.5px; font-weight:700; letter-spacing:.06em; color:var(--side-faint); text-transform:uppercase; padding:0 6px 9px}
  .skpi{display:flex; flex-direction:column; gap:14px; padding:2px 6px}
  .skpi .row{display:flex; flex-direction:column; gap:2px}
  .skpi .k{font-size:11.5px; color:var(--side-muted)}
  .skpi .v{font-size:20px; font-weight:740; letter-spacing:-.02em; color:#fff; line-height:1}
  .skpi .v .u{font-size:12px;font-weight:600;color:var(--side-muted);margin-left:1px}
  .skpi .s{font-size:10.5px; color:var(--side-faint); display:flex; align-items:center; gap:5px}
  .sdelta{font-weight:700;padding:0 5px;border-radius:5px;font-size:10px}
  .sdelta.up{color:#5FD0A8;background:rgba(95,208,168,.14)} .sdelta.down{color:#F58AA0;background:rgba(245,138,160,.14)} .sdelta.flat{color:var(--side-muted);background:rgba(255,255,255,.06)}
  .sgood{color:#5FD0A8}

  .side-foot{margin-top:auto; padding-top:20px; display:flex; flex-direction:column; gap:9px}
  .src{font-size:10.5px; color:var(--side-faint); padding:0 6px}
  .src b{color:var(--side-muted); font-weight:600}
  .sbtns{display:flex; gap:7px}
  .sbtn{flex:1; display:flex; align-items:center; justify-content:center; gap:6px; padding:9px; border-radius:9px; background:rgba(255,255,255,.07); color:var(--side-ink); font-size:12px; font-weight:600; transition:.13s}
  .sbtn:hover{background:rgba(255,255,255,.13)}
  .sbtn.pri{background:var(--karrot); color:#fff}.sbtn.pri:hover{background:#ff7d24}
  .sbtn svg{width:14px;height:14px}
  .snote{font-size:10px;color:var(--side-faint);padding:2px 6px 0;text-align:center}

  /* ===== main ===== */
  .main{min-width:0; display:flex; flex-direction:column}
  .content{padding:28px 30px 8px; display:flex; flex-direction:column; gap:20px}

  .card{background:var(--surface); border-radius:var(--r); box-shadow:var(--sh); padding:22px 24px}
  .card-h{display:flex; align-items:baseline; gap:10px; margin:0 0 16px}
  .card-h h2{font-size:16px; font-weight:740; margin:0; letter-spacing:-.01em}
  .card-h .meta{font-size:12px; color:var(--muted)} .card-h .meta b{color:var(--ink);font-weight:650}
  .sub-h{font-size:12px; font-weight:700; color:var(--muted); margin:18px 0 11px; letter-spacing:.01em}

  /* leaderboard — compact, width-capped */
  .ldr-g{margin-top:4px}
  .ldr-h{font-size:12px;font-weight:700;margin:0 0 9px;display:flex;align-items:center;gap:7px;color:var(--muted)}
  .ldr-h .dot{width:8px;height:8px;border-radius:50%}
  .ldr-h.good .dot{background:var(--g1)} .ldr-h.bad .dot{background:var(--w2)}
  .ldr-g + .ldr-g{margin-top:16px}
  .lead{display:flex;flex-wrap:wrap;gap:10px}
  .lcard{flex:1 1 230px;min-width:208px;max-width:308px;background:var(--surface-2);border-radius:var(--r-sm);padding:12px 13px;display:flex;flex-direction:column;gap:7px}
  .lcard.gold{background:var(--gold-f)} .lcard.bad{background:var(--w2-f)}
  .lhead{display:flex;align-items:flex-start;gap:8px}
  .rk{width:22px;height:22px;border-radius:50%;display:grid;place-items:center;font-weight:800;font-size:12px;color:#fff;flex:0 0 auto;margin-top:1px}
  .rk.g{background:var(--gold)} .rk.s{background:var(--silver)} .rk.b{background:var(--bronze)} .rk.r{background:var(--w2)}
  .lname{font-size:12.5px;font-weight:650;line-height:1.32;word-break:break-all;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;flex:1}
  .dom-pill{font-size:9px;font-weight:800;color:var(--gold);background:rgba(216,165,33,.16);padding:2px 6px;border-radius:5px;letter-spacing:.02em;white-space:nowrap;flex:0 0 auto;margin-top:1px}
  .lcard.gold .dom-pill{background:rgba(255,255,255,.5)}
  .dom-pill.bad{color:var(--w2);background:rgba(199,63,84,.14)} .lcard.bad .dom-pill.bad{background:rgba(255,255,255,.5)}
  .chips{display:flex;gap:5px;flex-wrap:wrap}
  .chip{font-size:10px;padding:2px 8px;border-radius:6px;background:var(--surface-3);color:var(--muted);font-weight:500}
  .lcard.gold .chip,.lcard.bad .chip{background:rgba(255,255,255,.55)}
  .chip.fo{background:var(--g1-f);color:var(--g1)} .lcard.gold .chip.fo,.lcard.bad .chip.fo{background:rgba(255,255,255,.6)}
  .lfoot{display:flex;align-items:center;gap:9px;margin-top:1px}
  .lfoot .sp{flex:0 0 auto;font-size:12.5px;padding:2px 8px}
  .lreason{font-size:11px;color:var(--muted);line-height:1.38} .lreason b{color:var(--ink);font-weight:650}

  /* analysis */
  .keyrow{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
  @media(max-width:760px){.keyrow{grid-template-columns:1fr}}
  .ktile{background:var(--surface-2);border-radius:var(--r-sm);padding:13px 15px}
  .ktile .kt-k{font-size:11px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:6px}
  .ktile .kt-k svg{width:14px;height:14px}
  .ktile .kt-v{font-size:14px;font-weight:700;margin-top:5px;letter-spacing:-.01em}
  .ktile .kt-s{font-size:11px;color:var(--muted);margin-top:3px}
  .ktile.g .kt-k{color:var(--g1)} .ktile.b .kt-k{color:var(--w2)} .ktile.n .kt-k{color:var(--c2)}

  svg.chart{display:block;overflow:visible;max-width:100%}
  .axis text{font-size:10px;fill:var(--faint)} .gl{stroke:#E6E5DE;stroke-dasharray:2 3}
  .qnote{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:12px;font-size:11px}
  .qnote div{padding:7px 10px;border-radius:8px;background:var(--surface-2)} .qnote b{font-weight:700}
  .quad-tier-legend{display:flex;justify-content:center;align-items:center;gap:8px;flex-wrap:wrap;margin-top:14px;padding:9px 12px;background:var(--surface-2);border-radius:9px;font-size:12px}
  .quad-tier-legend .qtl-item{display:inline-flex;align-items:center;gap:5px}
  .quad-tier-legend .qtl-dot{display:inline-block;width:11px;height:11px;border-radius:50%}
  .quad-tier-legend .qtl-lab{color:var(--ink);font-weight:650}
  .quad-tier-legend .qtl-sep{color:var(--faint);margin:0 2px}
  .qhint{font-size:11px;color:var(--faint);margin:0 0 6px}
  .qaxis{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .qaxis .qaxis-lab{font-size:10px;color:var(--faint);font-weight:700;letter-spacing:.06em;text-transform:uppercase;width:34px;flex:0 0 auto}
  .twocol{display:grid;grid-template-columns:1fr 1fr;gap:24px}
  @media(max-width:760px){.twocol{grid-template-columns:1fr}}
  .leg{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--muted);margin-top:6px}
  .leg span{display:inline-flex;align-items:center;gap:5px}.leg i{width:10px;height:10px;border-radius:3px}
  .bd{display:grid;gap:14px}
  .bd-row{display:grid;grid-template-columns:130px 1fr 130px;column-gap:12px;row-gap:4px;align-items:center;font-size:12px}
  .bd-row .lab{font-weight:650;display:flex;align-items:center;gap:6px;flex-wrap:wrap;overflow:hidden}
  .bd-row .lab .bd-n{font-size:10.5px;color:var(--faint);font-weight:500;background:var(--surface-3);padding:0 6px;border-radius:5px}
  .bd-row .lab .bd-tag{font-size:9.5px;font-weight:800;padding:1px 5px;border-radius:4px;letter-spacing:.02em}
  .bd-row .lab .bd-tag.good{color:var(--g1);background:var(--g1-f)}
  .bd-row .lab .bd-tag.bad{color:var(--w2);background:var(--w2-f)}
  .bd-bar{height:14px;border-radius:5px;background:var(--surface-2);overflow:hidden}
  .bd-bar i{display:block;height:100%;border-radius:5px;background:var(--karrot);transition:width .22s}
  .bd-bar.best i{background:var(--g1)} .bd-bar.worst i{background:var(--w2)}
  .bd-pri{font-size:12px;text-align:right;white-space:nowrap;color:var(--ink)}
  .bd-pri .bd-pri-k{color:var(--faint);font-size:10.5px;margin-right:3px;font-weight:600}
  .bd-pri b{font-weight:740;font-size:13px}
  .bd-metrics{grid-column:1 / -1;font-size:11px;color:var(--muted);padding-left:0;line-height:1.5}
  .bd-metrics b{color:var(--ink);font-weight:650}
  .bd-metrics .bd-cost{color:var(--faint);font-size:10.5px;margin-left:6px}
  .bd-sub{color:var(--muted);font-size:11px;font-weight:500;margin-left:6px}
  .bd-empty{font-size:12px;color:var(--faint);padding:8px}

  /* quadrant + dual-thumb sliders pinned to plot area */
  .quad-wrap{position:relative;display:flex;flex-direction:column;gap:6px}
  /* svg wrap gets padding-left for y slider and padding-bottom for x slider */
  .quad-svgwrap{position:relative;min-width:0;padding-left:28px;padding-bottom:26px;width:100%}
  .quad-svgwrap svg.chart{display:block}
  .dual{position:absolute;user-select:none;touch-action:none}
  .dual .dtrk{position:absolute;background:var(--surface-2);border-radius:3px}
  .dual .dfill{position:absolute;background:var(--karrot);border-radius:3px;opacity:.6}
  .dual .dthb{position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;border:2.5px solid var(--karrot);box-shadow:0 1px 3px rgba(0,0,0,.22);z-index:2;transition:box-shadow .12s}
  .dual .dthb.act,.dual .dthb:hover{box-shadow:0 2px 9px rgba(255,111,15,.5)}
  /* X slider: aligned to plot horizontally — padding-left(28)+pad.l(66)=94 from left, pad.r(38) from right */
  .dual-x{left:94px;right:38px;bottom:2px;height:20px;cursor:pointer}
  .dual-x .dtrk{left:0;right:0;top:50%;height:5px;transform:translateY(-50%)}
  .dual-x .dfill{top:50%;height:5px;transform:translateY(-50%)}
  .dual-x .dthb{top:50%;transform:translate(-50%,-50%);cursor:ew-resize}
  /* Y slider: aligned to plot vertically — pad.t(16) from top, padding-bottom(26)+pad.b(44)=70 from bottom */
  .dual-y{left:4px;top:16px;bottom:70px;width:20px;cursor:pointer}
  .dual-y .dtrk{top:0;bottom:0;left:50%;width:5px;transform:translateX(-50%)}
  .dual-y .dfill{left:50%;width:5px;transform:translateX(-50%)}
  .dual-y .dthb{left:50%;transform:translate(-50%,-50%);cursor:ns-resize}
  /* value row */
  .quad-rangerow{display:flex;justify-content:center;align-items:center;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--muted);padding:2px 0;position:relative}
  .quad-rangerow .qrv b{color:var(--ink);font-weight:650}
  .quad-rangerow .qrv-k{color:var(--faint);font-weight:600;margin-right:4px}
  .quad-reset{margin-left:auto;padding:4px 11px;border-radius:7px;background:var(--surface-2);color:var(--muted);font-size:11px;font-weight:650}
  .quad-reset:hover{background:var(--surface-3);color:var(--ink)}
  #quad circle.qb{cursor:pointer;transition:fill-opacity .12s}
  #quad circle.qb:hover{fill-opacity:.92!important}
  .dtog{display:flex;gap:5px;flex-wrap:wrap}
  .dtog button{padding:4px 11px;border-radius:7px;background:var(--surface-2);color:var(--muted);font-size:11.5px;font-weight:600}
  .dtog button:hover{color:var(--ink)}
  .dtog button.on{background:var(--ink);color:#fff}
  .bd-tog-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .bd-tog-row .bd-tog-lab{font-size:10px;color:var(--faint);font-weight:700;letter-spacing:.06em;text-transform:uppercase;flex:0 0 auto;width:34px}
  .bd-tog-row + .bd-tog-row{margin-top:-2px}
  #bd{margin-top:6px}

  /* table */
  .tbar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:12px}
  .tbar input[type=search]{flex:0 0 auto;background:var(--surface-2);border-radius:9px;padding:8px 13px;font:inherit;font-size:12.5px;width:230px;max-width:50vw}
  .tbar input[type=search]:focus{outline:2px solid var(--gold-f)}
  .tfilter{position:relative}
  .tfbtn{background:var(--surface-2);border-radius:9px;padding:8px 13px;font-size:12.5px;font-weight:650;color:var(--muted);display:inline-flex;align-items:center;gap:6px}
  .tfbtn:hover{color:var(--ink)}
  .tfbtn.on{background:var(--ink);color:#fff}
  .tfcnt{background:var(--karrot);color:#fff;font-size:10px;font-weight:800;padding:1px 6px;border-radius:9px;min-width:18px;text-align:center}
  .qfo{display:inline-flex;gap:6px;align-items:center;flex-wrap:wrap}
  .qfo-btn{background:var(--surface-2);border-radius:9px;padding:6px 11px;font-size:13px;line-height:1;cursor:pointer;border:1.5px solid transparent;color:var(--muted);font-weight:650;filter:opacity(.85);transition:filter .15s,border-color .15s,background .15s,color .15s}
  .qfo-btn:hover{filter:opacity(1);color:var(--ink)}
  .qfo-btn.on{background:var(--karrot-f);border-color:var(--karrot);color:var(--karrot);filter:none}
  .qfo-btn.qfo-txt{font-size:12.5px;font-weight:700}
  .tfpop{position:absolute;top:calc(100% + 6px);left:0;z-index:40;background:var(--surface);border-radius:12px;box-shadow:0 12px 36px -8px rgba(0,0,0,.28);padding:12px;min-width:280px;max-width:380px}
  .tfhead{font-size:10.5px;font-weight:700;letter-spacing:.06em;color:var(--faint);text-transform:uppercase;padding:0 4px 8px}
  .tf-sec{margin-top:6px}
  .tf-sec+.tf-sec{margin-top:12px;padding-top:10px;border-top:1px solid var(--surface-2)}
  .tf-sec .tf-lab{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px}
  .tf-chips{display:flex;flex-wrap:wrap;gap:5px}
  .tf-chip{padding:4px 10px;border-radius:6px;background:var(--surface-2);color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;user-select:none}
  .tf-chip:hover{color:var(--ink)}
  .tf-chip.on{background:var(--karrot);color:#fff}
  .tffoot{margin-top:10px;padding-top:8px;border-top:1px solid var(--surface-2);display:flex;justify-content:flex-end}
  .tffoot button{background:var(--surface-2);color:var(--muted);border-radius:7px;padding:5px 11px;font-size:11px;font-weight:600}
  .tffoot button:hover{color:var(--ink)}
  .chk{display:inline-flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);cursor:pointer;user-select:none}
  .chk input{width:15px;height:15px;accent-color:var(--karrot)}
  .tlegend{display:flex;gap:13px;flex-wrap:wrap;font-size:11px;color:var(--muted);margin-left:auto}
  .tlegend span{display:inline-flex;align-items:center;gap:5px}.tlegend svg{width:15px;height:15px}
  .tbl-scroll{overflow-x:auto;overflow-y:visible;border-radius:10px;background:var(--surface-2)}
  table{border-collapse:separate;border-spacing:0;width:100%;font-size:12.5px}
  th,td{padding:9px 11px;text-align:right;white-space:nowrap}
  tbody td{background:var(--surface)}
  th.name,td.name{text-align:left;white-space:normal;min-width:230px}
  th.bdg,td.bdg{width:58px;padding-left:14px;text-align:left}
  thead th{position:sticky;top:0;background:var(--surface-2);z-index:3;font-weight:650;color:var(--muted);cursor:pointer;user-select:none}
  thead th.help{text-decoration:underline dotted #cfcdc4;text-underline-offset:3px}
  thead th.sorted{color:var(--karrot)}
  thead th .arr{opacity:.55;font-size:10px}

function showTip(h,x,y,big){tip.innerHTML=h;tip.classList.toggle("big",!!big);tip.style.opacity=1;const w=tip.offsetWidth,ht=tip.offsetHeight;let nx=x+14,ny=y+14;if(nx+w>innerWidth-8)nx=x-w-14;if(ny+ht>innerHeight-8)ny=y-ht-14;tip.style.left=Math.max(6,nx)+"px";tip.style.top=Math.max(6,ny)+"px";}

function parseCSV(text){text=text.replace(/^\uFEFF/,"").replace(/\r\n?/g,"\n");const rows=[];let row=[],cur="",q=false;
  for(let i=0;i<text.length;i++){const c=text[i];if(q){if(c==='"'){if(text[i+1]==='"'){cur+='"';i++;}else q=false;}else cur+=c;}else{if(c==='"')q=true;else if(c===","){row.push(cur);cur="";}else if(c==="\n"){row.push(cur);rows.push(row);row=[];cur="";}else cur+=c;}}
  if(cur.length||row.length){row.push(cur);rows.push(row);}if(!rows.length)return{headers:[],data:[]};
  const headers=rows[0].map(h=>h.trim());const data=rows.slice(1).filter(r=>r.length>1&&r.some(x=>x!=="")).map(r=>{const o={};headers.forEach((h,i)=>o[h]=(r[i]??"").trim());return o;});return{headers,data};}

    &nbsp;&nbsp;<b>R</b> = pctRank(노출 수)&nbsp;&nbsp;→ 도달 규모 백분위<br>
    &nbsp;&nbsp;<b>C</b> = min(1, ln(1+전환)/ln(1+30))&nbsp;&nbsp;→ 표본이 적을수록 감쇠
  </div>

  <div class="ft-grid">
    <div>
      <h4>왜 백분위(percentile rank)인가</h4>
      <p>ROAS 30배와 CPM 800원은 스케일이 다르므로 절대값을 그대로 더할 수 없습니다.
      백분위 정규화는 <b>계정 내 상대 위치</b>로 환산해 비교 가능하게 합니다 —
      Google Ads Quality Score가 자기 계정·자기 카테고리 내에서 상대 평가되는 것과 같은 원리입니다.
      이상치(outlier)에 강하고, 지표의 단위·분포 왜곡에 둔감합니다.</p>
    </div>
    <div>
      <h4>왜 효율에 75%를 배정했나</h4>
      <p>퍼포먼스 마케팅의 목표는 <b>효율의 개선</b>입니다. 규모는 이미 매체 알고리즘이 학습된 후 확대되는 결과이자
      제약 조건입니다. iROAS·MMM 문헌(Chen & Google 2018; Meta &amp; Nielsen Robyn 2021)이 공통적으로 강조하듯,
      크리에이티브 평가는 <b>규모 대비 효율(efficiency-at-scale)</b>이 핵심이며, 규모는 별도의 도달·인지 축으로 다루어야 합니다.</p>
    </div>
  </div>
</details>

<details>
  <summary>규모(R)와 통계적 신뢰도(C)</summary>
  <p><b>R = 노출 수의 계정 내 백분위</b>. 즉, 100번 노출된 소재와 100만번 노출된 소재를 같은 잣대로 세우지 않습니다.
  이는 도달(Reach)이 광고 효과의 필수 조건이라는 <i>Byron Sharp - How Brands Grow</i>의 물리적 가용성(Physical Availability) 논지와,
  Nielsen과 Analytic Partners 같은 MMM 벤더들이 iROAS 산정 시 <b>도달 규모 조정(reach adjustment)</b>을 수행하는 관행에 부합합니다.</p>
  <p><b>C = 표본 크기에 따른 감쇠(shrinkage)</b>. 전환 3건짜리 소재의 ROAS가 30이 나와도 우연일 수 있습니다.
  경험적 베이지안(empirical Bayes) 축소 추정의 정신을 반영해 로그 스케일로 신뢰도를 부여했습니다 —
  <b>전환 30건에서 완전 신뢰(C=1)</b>, 그 이하는 <code>ln(1+n)/ln(1+30)</code>로 감쇠.
  30이라는 임계값은 통계학의 관습적 표본 최소치(central limit theorem의 실무적 기준)에서 취했습니다.</p>
</details>

<details>
  <summary>등급(Tier) — 매우 좋음 / 좋음 / 보통 / 나쁨 / 매우 나쁨</summary>
  <p>계산된 점수를 자체 계정 내 <b>5분위(quintile)</b>로 자른 상대 등급입니다.</p>
  <ul>
    <li><b>매우 좋음</b> — 상위 20%</li>
    <li><b>좋음</b> — 상위 20–40%</li>
    <li><b>보통</b> — 40–60% (기준선)</li>
    <li><b>나쁨</b> — 하위 20–40%</li>
    <li><b>매우 나쁨</b> — 하위 20%</li>
  </ul>
  <p>절대 임계값이 아닌 상대 등급이므로, 계정 전체가 개선되면 같은 점수라도 등급이 하락할 수 있습니다.
  이것이 실제 계정 관리의 목적(계속되는 개선)에 맞는 신호입니다.</p>
</details>

<details>
  <summary>대상 산정에서 제외되는 항목</summary>
  <ul>
    <li>광고비가 하위 15% 미만인 저광고비 소재 — 단발성 실험 노이즈 제거</li>
    <li>핵심 지표(가중치 15% 이상) 중 하나라도 결측인 소재</li>
    <li>노출/클릭이 극도로 적어 통계적 판단이 불가능한 소재는 C 감쇠로 점수 낮게 조정</li>
    <li>비활성(광고비 0)은 표에서 기본 숨김 · "비활성도 보기" 체크로 표시</li>
  </ul>
</details>

<details>
  <summary>독보적(dominant) 표기</summary>
  <p>상위 점수 소재 중 <b>1순위 지표(예: Google이면 ROAS, Ad면 eCPI)에서 계정 중앙값 대비 1.8배 이상</b> 차이가 나고,
  <b>2위와 점수 차이가 3점 이상</b> 벌어질 때만 왕관(👑) + "독보적" 태그를 부여합니다.
  최하위도 마찬가지로 중앙값 대비 2배 이상 열위이고 위 아래와 점수 차이가 3점 이상일 때 "매우 나쁨" 강조 표기.
  단, 광고비가 계정 중앙값 이하인 소재는 규모 부족으로 판단하여 독보적 인정 대상에서 제외합니다.</p>
</details>

function resetAll(){Object.keys(DATASETS).forEach(k=>delete DATASETS[k]);active=null;bdDim=null;bdMet=null;tableShowAll=false;
  tState={sort:"score",dir:-1,q:""};tFilter={ve:new Set(),fo:new Set(),size:new Set()};tQuickFo=null;tGroupBy=false;tPage=1;ISLE.name=null;ISLE.metric=null;

function dropZone(e){if(!e||e.clientY==null)return null;
  const H=window.innerHeight||800,W=window.innerWidth||1200;
  if(e.clientY/H<0.8)return null;
  const x=e.clientX/W;
  return{mode:"channeled",channel:x<1/3?"Google":x<2/3?"Moloco":"Meta"};}
function handleFiles(files,opts){const arr=[...files];let pending=arr.length;if(!pending)return;
  const parsed=[],failed=[];
  function done(){
    if(!parsed.length){toast("CSV 형식을 알 수 없음 — ad_name/creative_group_name/adset_name 컬럼이 필요");return;}
    let newMode,chanFor;
    const gForce=parsed.some(p=>p.forceCh==="Google");
    if(gForce){newMode="channeled";chanFor=(p)=>p.forceCh||fileChannel(p.fname)||null;}
    else if(opts&&opts.mode){newMode=opts.mode;chanFor=(_)=>opts.channel||null;}
    else{const hints=parsed.map(p=>fileChannel(p.fname)).filter(Boolean);
      if(hints.length){newMode="channeled";chanFor=(p)=>fileChannel(p.fname)||"기타";}
      else{newMode="unified";chanFor=(_)=>null;}}
    if(newMode!==dsMode)resetAll();
    else if(newMode==="unified")resetAll();
    dsMode=newMode;
    setWeeksFromDatasets(...parsed.map(p=>p.data));const loaded=new Set(),channels=new Set();
    parsed.forEach(p=>{const ch=chanFor(p);if(ch)channels.add(ch);
      const k=ingest(p.headers,p.data,p.fname,ch);
      if(k)loaded.add(LEVELS[k].name);});
    refreshAll();
    const chTxt=channels.size?` · ${[...channels].join("/")}`:" · 통합";
    const gTxt=gForce?"✓ Google Ads Data 감지됨 · ":"";
    toast(`${gTxt}교체됨: ${[...loaded].join(", ")}${chTxt}${failed.length?` · 건너뜀 ${failed.length}건`:""}`);
  }
  arr.forEach(f=>{const rd=new FileReader();
    rd.onload=()=>{const raw=rd.result;
      if(isGoogleReport(raw)){const g=parseGoogleReport(raw);
        if(g)parsed.push({headers:g.headers,data:g.data,fname:f.name,forceCh:"Google"});else failed.push(f.name);
      }else{const r=parseCSV(raw);const k=detect(r.headers);
        if(k)parsed.push({headers:r.headers,data:r.data,fname:f.name});else failed.push(f.name);}
      if(--pending===0)done();};
    rd.onerror=()=>{failed.push(f.name);if(--pending===0)done();};
    rd.readAsText(f,"utf-8");});}

function setupDual(rootId,vertical,getQ,setQ){const el=$("#"+rootId);
  const fill=el.querySelector(".dfill"),thumbs=[...el.querySelectorAll(".dthb")];
  const t=h=>thumbs.find(x=>x.dataset.h===h);
  function paint(){const q=getQ();
    if(vertical){const lo=q.lo+"%",hi=q.hi+"%";
      t("lo").style.top=(100-q.lo)+"%";t("hi").style.top=(100-q.hi)+"%";
      fill.style.top=(100-q.hi)+"%";fill.style.bottom=q.lo+"%";}
    else{t("lo").style.left=q.lo+"%";t("hi").style.left=q.hi+"%";
      fill.style.left=q.lo+"%";fill.style.right=(100-q.hi)+"%";}}
  function fracFromEvent(e){const r=el.getBoundingClientRect();
    if(vertical){const f=(e.clientY-r.top)/r.height;return Math.max(0,Math.min(1,1-f));}
    const f=(e.clientX-r.left)/r.width;return Math.max(0,Math.min(1,f));}
  let drag=null;
  function down(e){e.preventDefault();const tg=e.target.closest(".dthb");
    if(tg){drag=tg.dataset.h;tg.classList.add("act");}
    else{const pct=fracFromEvent(e)*100,q=getQ();drag=Math.abs(pct-q.lo)<Math.abs(pct-q.hi)?"lo":"hi";t(drag).classList.add("act");}
    move(e);window.addEventListener("pointermove",move);window.addEventListener("pointerup",up);}
  function move(e){if(!drag)return;const pct=Math.round(fracFromEvent(e)*100),q={...getQ()};
    if(drag==="lo")q.lo=Math.min(pct,q.hi-1);else q.hi=Math.max(pct,q.lo+1);
    setQ(q);paint();}
  function up(){if(drag)t(drag).classList.remove("act");drag=null;
    window.removeEventListener("pointermove",move);window.removeEventListener("pointerup",up);}
  el.addEventListener("pointerdown",down);
  return{paint,reset:()=>{const q=getQ();q.lo=0;q.hi=100;setQ(q);paint();}};}
const _qxRange=setupDual("qxRange",false,()=>({lo:qView.xlo,hi:qView.xhi}),q=>{qView.xlo=q.lo;qView.xhi=q.hi;_qRender();});
const _qyRange=setupDual("qyRange",true,()=>({lo:qView.ylo,hi:qView.yhi}),q=>{qView.ylo=q.lo;qView.yhi=q.hi;_qRender();});
function _qResetRanges(){qView={xlo:0,xhi:100,ylo:0,yhi:100};_qxRange.paint();_qyRange.paint();}
